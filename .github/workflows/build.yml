name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Add android platform
        run: npx cap add android

      - name: Generate app icons and splash screens
        run: npx @capacitor/assets generate --android --pwa false

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set minSdkVersion 26 for Health Connect
        run: sed -i 's/minSdkVersion = 23/minSdkVersion = 26/' android/variables.gradle

      - name: Add network security config
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="false">
                  <trust-anchors>
                      <certificates src="system"/>
                      <certificates src="user"/>
                  </trust-anchors>
              </base-config>
          </network-security-config>
          EOF

      - name: Patch AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml

          # Network security config
          sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' "$MANIFEST"

          # Notifications permission
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>\n\n    <!-- Health Connect -->\n    <queries>\n        <package android:name="com.google.android.apps.healthdata" />\n    </queries>\n    <uses-permission android:name="android.permission.health.READ_STEPS"/>\n    <uses-permission android:name="android.permission.health.READ_HEART_RATE"/>\n    <uses-permission android:name="android.permission.health.READ_SLEEP"/>\n    <uses-permission android:name="android.permission.health.READ_ACTIVE_CALORIES_BURNED"/>\n    <uses-permission android:name="android.permission.health.READ_TOTAL_CALORIES_BURNED"/>\n</manifest>|' "$MANIFEST"

          # Health Connect intent filters in main activity
          sed -i 's|</activity>|    <intent-filter>\n                    <action android:name="androidx.health.ACTION_SHOW_PERMISSIONS_RATIONALE" />\n                </intent-filter>\n                <intent-filter>\n                    <action android:name="android.intent.action.VIEW_PERMISSION_USAGE"/>\n                    <category android:name="android.intent.category.HEALTH_PERMISSIONS"/>\n                </intent-filter>\n            </activity>|' "$MANIFEST"

      - name: Get app version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/magni_v${{ steps.version.outputs.VERSION }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: magni_v${{ steps.version.outputs.VERSION }}
          path: android/app/build/outputs/apk/debug/magni_v${{ steps.version.outputs.VERSION }}.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "Magni v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Magni v${{ steps.version.outputs.VERSION }}

            **Install:**
            1. Download `magni_v${{ steps.version.outputs.VERSION }}.apk`
            2. Settings → Security → Install unknown apps → allow browser
            3. Open the APK and install

            Built from ${{ github.sha }}
          files: android/app/build/outputs/apk/debug/magni_v${{ steps.version.outputs.VERSION }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
